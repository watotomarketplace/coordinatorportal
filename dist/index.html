  <!-- Inline mobile guard: runs BEFORE React hydrates, kills desktop flash -->
  <style id="wl-mobile-guard-css">
    @media (max-width: 768px) {
      /* Hide React root on mobile until we know what route we're on */
      html.wl-mobile-pending #root { visibility: hidden !important; }
      /* Once mobile-app.js decides to mount a mobile page, #root stays hidden */
      body.wl-mobile-mode #root { display: none !important; }
      /* When the launcher home screen is visible, React dashboard must not bleed through */
      body.wl-home-active #root { display: none !important; }
      /* Preload dark backdrop so there's no white flash */
      html.wl-mobile-pending,
      html.wl-mobile-pending body {
        background-color: #0c0c14 !important;
      }
    }
  </style>
  <script>
    (function () {
      // Synchronous mobile detection - runs before React mounts
      if (window.innerWidth <= 768) {
        document.documentElement.classList.add('wl-mobile-pending');
        // Mark mobile mode immediately if not on login/dashboard
        var p = window.location.pathname;
        var isLogin = (p === '/login');
        var isDash = (p === '/' || p === '' || p === '/dashboard');
        if (!isLogin && !isDash) {
          // Will be confirmed by mobile-app.js when it runs
          document.documentElement.dataset.wlMobileRoute = p;
        }
      }
    })();
  </script>

  <!-- macOS Window Controls -->
  <style>
    /* macOS-style window resizing for all modals */
    .modal-overlay .modal,
    .modal-overlay .glass-card.modal,
    .settings-modal-window {
      resize: both;
      overflow: auto !important;
      min-width: 380px;
      min-height: 320px;
      position: relative;
    }

    /* Make traffic light buttons clickable */
    .traffic-btn,
    .traffic-btn.red,
    .traffic-btn.yellow,
    .traffic-btn.green,
    button[style*="background:#ff5f56"],
    div[style*="background:#ffbd2e"],
    div[style*="background:#27c93f"] {
      -webkit-app-region: no-drag !important;
      pointer-events: auto !important;
      z-index: 99999 !important;
      position: relative;
    }
  </style>

  <script>
    // Bulletproof click handler for traffic light buttons
    document.addEventListener('click', function (e) {
      if (!e.isTrusted) return;

      var el = e.target;

      // 🟢 GREEN: Maximize window
      if (el.matches('.traffic-btn.green') || (el.tagName === 'DIV' && el.style.background === 'rgb(39, 201, 63)')) {
        e.stopPropagation();
        e.preventDefault();
        var modal = el.closest('.settings-modal-window, .modal, .glass-card.modal');
        if (modal) modal.classList.toggle('modal-maximized');
        return;
      }

      // 🟡 YELLOW: Minimize window
      if (el.matches('.traffic-btn.yellow') || (el.tagName === 'DIV' && el.style.background === 'rgb(255, 189, 46)')) {
        e.stopPropagation();
        e.preventDefault();
        var overlay = el.closest('.modal-overlay');
        var modal = el.closest('.settings-modal-window, .modal, .glass-card.modal');
        if (modal) {
          modal.classList.add('modal-minimized');
          setTimeout(function () { if (overlay) overlay.style.display = 'none'; }, 400);
        }
        return;
      }

      // 🔴 RED: Close window (fallback)
      if (el.matches('.traffic-btn.red') || (el.tagName === 'BUTTON' && el.style.background === 'rgb(255, 95, 86)')) {
        setTimeout(function () {
          var overlay = el.closest('.modal-overlay');
          if (overlay && overlay.isConnected) overlay.style.display = 'none';
        }, 100);
      }
    }, true);
  </script>
